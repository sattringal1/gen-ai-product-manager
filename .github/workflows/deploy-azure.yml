name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "Product-demo/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: rg-genai-pm
  ACR_NAME:       genaipmacr
  BACKEND_APP:    genai-pm-backend
  FRONTEND_APP:   genai-pm-frontend
  CONTAINER_ENV:  genai-pm-env

jobs:
  # ── Build & push Docker images ──────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest

    outputs:
      backend-image:  ${{ steps.images.outputs.backend }}
      frontend-image: ${{ steps.images.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Authenticate Docker to ACR via Azure token
        run: |
          ACR_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)
          ACR_TOKEN=$(az acr login --name ${{ env.ACR_NAME }} --expose-token --query accessToken -o tsv)
          echo "::add-mask::$ACR_TOKEN"
          echo "$ACR_TOKEN" | docker login "$ACR_SERVER" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV

      - name: Set image names
        id: images
        run: |
          echo "backend=${{ env.ACR_SERVER }}/genai-pm-backend"   >> $GITHUB_OUTPUT
          echo "frontend=${{ env.ACR_SERVER }}/genai-pm-frontend" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./Product-demo/backend
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.images.outputs.backend }}:latest
          cache-to:   type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Product-demo/frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:latest
            ${{ steps.images.outputs.frontend }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ steps.images.outputs.frontend }}:latest
          cache-to:   type=inline

  # ── Deploy to Azure Container Apps ─────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials (masked)
        run: |
          ACR_SERVER=$(az acr show --name ${{ env.ACR_NAME }} --query loginServer -o tsv)
          ACR_USER=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASS=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          echo "::add-mask::$ACR_PASS"
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          echo "ACR_USER=$ACR_USER"     >> $GITHUB_ENV
          echo "ACR_PASS=$ACR_PASS"     >> $GITHUB_ENV

      - name: Generate app secret key
        run: |
          APP_SECRET=$(openssl rand -hex 32)
          echo "::add-mask::$APP_SECRET"
          echo "APP_SECRET=$APP_SECRET" >> $GITHUB_ENV

      - name: Get backend internal FQDN
        run: |
          # CORS: allow all azurecontainerapps.io origins — handled by allow_origin_regex in FastAPI
          echo "CORS_ORIGINS=https://genai-pm-frontend.blackpond-cceed3d9.westus2.azurecontainerapps.io" >> $GITHUB_ENV

          # Internal FQDN: <app>.internal.<env-default-domain>, port 443 (HTTPS required internally)
          ENV_DOMAIN=$(az containerapp env show \
            --name ${{ env.CONTAINER_ENV }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.defaultDomain" -o tsv)
          echo "BACKEND_HOST=genai-pm-backend.internal.${ENV_DOMAIN}" >> $GITHUB_ENV
          echo "BACKEND_PORT=443" >> $GITHUB_ENV

      - name: Deploy backend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:           ${{ env.RESOURCE_GROUP }}
          containerAppName:        ${{ env.BACKEND_APP }}
          containerAppEnvironment: ${{ env.CONTAINER_ENV }}
          imageToDeploy:           ${{ needs.build.outputs.backend-image }}:${{ github.sha }}
          registryUrl:             ${{ env.ACR_SERVER }}
          registryUsername:        ${{ env.ACR_USER }}
          registryPassword:        ${{ env.ACR_PASS }}
          targetPort:              8000
          ingress:                 internal
          environmentVariables: >
            LLM_PROVIDER=openai
            OPENAI_MODEL=gpt-4o
            APP_ENV=production
            LOG_LEVEL=INFO
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            SECRET_KEY=${{ env.APP_SECRET }}
            CORS_ORIGINS=${{ env.CORS_ORIGINS }}
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
            JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
            JIRA_PROJECT_KEY=${{ secrets.JIRA_PROJECT_KEY }}
            CONFLUENCE_BASE_URL=${{ secrets.CONFLUENCE_BASE_URL }}
            CONFLUENCE_EMAIL=${{ secrets.CONFLUENCE_EMAIL }}
            CONFLUENCE_API_TOKEN=${{ secrets.CONFLUENCE_API_TOKEN }}
            CONFLUENCE_SPACE_KEY=${{ secrets.CONFLUENCE_SPACE_KEY }}

      - name: Deploy frontend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:           ${{ env.RESOURCE_GROUP }}
          containerAppName:        ${{ env.FRONTEND_APP }}
          containerAppEnvironment: ${{ env.CONTAINER_ENV }}
          imageToDeploy:           ${{ needs.build.outputs.frontend-image }}:${{ github.sha }}
          registryUrl:             ${{ env.ACR_SERVER }}
          registryUsername:        ${{ env.ACR_USER }}
          registryPassword:        ${{ env.ACR_PASS }}
          targetPort:              80
          ingress:                 external
          environmentVariables: >
            BACKEND_HOST=${{ env.BACKEND_HOST }}
            BACKEND_PORT=${{ env.BACKEND_PORT }}

      - name: Print live URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |"                  >> $GITHUB_STEP_SUMMARY
          echo "|---|---|"              >> $GITHUB_STEP_SUMMARY
          echo "| **Live URL** | https://${URL}/portal |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u) |"               >> $GITHUB_STEP_SUMMARY
          echo "Live at: https://${URL}/portal"
