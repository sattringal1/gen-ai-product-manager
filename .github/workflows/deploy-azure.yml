name: Build & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "Product-demo/**"
      - ".github/workflows/deploy-azure.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  RESOURCE_GROUP:   rg-genai-pm
  ACR_NAME:         genaipmacr
  BACKEND_APP:      genai-pm-backend
  FRONTEND_APP:     genai-pm-frontend
  CONTAINER_ENV:    genai-pm-env
  BACKEND_IMAGE:    genaipmacr.azurecr.io/genai-pm-backend
  FRONTEND_IMAGE:   genaipmacr.azurecr.io/genai-pm-frontend

jobs:
  # ── Build & push Docker images ────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Product-demo/backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Product-demo/frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  # ── Deploy to Azure Container Apps ───────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:        ${{ env.RESOURCE_GROUP }}
          containerAppName:     ${{ env.BACKEND_APP }}
          containerAppEnvironment: ${{ env.CONTAINER_ENV }}
          imageToDeploy:        ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          registryUrl:          ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername:     ${{ secrets.ACR_USERNAME }}
          registryPassword:     ${{ secrets.ACR_PASSWORD }}
          targetPort:           8000
          ingress:              internal
          environmentVariables: >
            LLM_PROVIDER=openai
            OPENAI_MODEL=gpt-4o
            APP_ENV=production
            LOG_LEVEL=INFO
            OPENAI_API_KEY=secretref:openai-key
            SECRET_KEY=secretref:app-secret-key
            JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
            JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
            JIRA_API_TOKEN=secretref:jira-api-token
            JIRA_PROJECT_KEY=${{ secrets.JIRA_PROJECT_KEY }}
            CONFLUENCE_BASE_URL=${{ secrets.CONFLUENCE_BASE_URL }}
            CONFLUENCE_EMAIL=${{ secrets.CONFLUENCE_EMAIL }}
            CONFLUENCE_API_TOKEN=secretref:confluence-api-token
            CONFLUENCE_SPACE_KEY=${{ secrets.CONFLUENCE_SPACE_KEY }}

      - name: Deploy frontend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup:        ${{ env.RESOURCE_GROUP }}
          containerAppName:     ${{ env.FRONTEND_APP }}
          containerAppEnvironment: ${{ env.CONTAINER_ENV }}
          imageToDeploy:        ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          registryUrl:          ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername:     ${{ secrets.ACR_USERNAME }}
          registryPassword:     ${{ secrets.ACR_PASSWORD }}
          targetPort:           80
          ingress:              external
          environmentVariables: >
            BACKEND_HOST=genai-pm-backend
            BACKEND_PORT=80

      - name: Get frontend URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "✅ Live at: https://$URL"
          echo "FRONTEND_URL=https://$URL" >> $GITHUB_ENV

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend** | ${{ env.FRONTEND_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed at** | $(date -u) |" >> $GITHUB_STEP_SUMMARY
