apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-pm-frontend
  namespace: genai-pm
  labels:
    app: genai-pm-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: genai-pm-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: genai-pm-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/genai-pm-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
