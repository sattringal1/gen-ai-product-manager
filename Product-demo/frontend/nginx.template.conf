server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy API calls to backend.
    # Azure Container Apps internal ingress only accepts HTTPS (even internally),
    # so we proxy over https and skip cert verification for the internal certificate.
    location /api/ {
        proxy_pass         https://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_ssl_verify   off;
        proxy_set_header   Host              ${BACKEND_HOST};
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health-api {
        proxy_pass       https://${BACKEND_HOST}:${BACKEND_PORT}/health;
        proxy_ssl_verify off;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
