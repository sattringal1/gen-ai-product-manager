services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genai-pm-backend
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - genai-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: genai-pm-frontend
    environment:
      # Points nginx proxy to the backend Docker Compose service name
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - genai-net

networks:
  genai-net:
    driver: bridge
